services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: salon
      POSTGRES_PASSWORD: salon
      POSTGRES_DB: salon_marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salon -d salon_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
